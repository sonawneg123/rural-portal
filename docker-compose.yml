# ============================================================
# docker-compose.yml — Rural Problems Portal
# Three-Tier: Frontend (Nginx+React) → Backend (Node) → MySQL
#
# Quick start:
#   cp backend/.env.example backend/.env   # fill GROQ_API_KEY etc.
#   docker-compose up --build
#   open http://localhost
# ============================================================

version: "3.9"

services:

  # ── Tier 1 — Frontend (React SPA + Nginx reverse proxy) ────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: /api
    container_name: rural-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - frontend-net
    healthcheck:
      test:     ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout:  10s
      retries:  3

  # ── Tier 2 — Backend (Node.js + Groq AI) ───────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    container_name: rural-backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      NODE_ENV: production
      PORT:     5000
      DB_HOST:  mysql          # Docker internal DNS
    expose:
      - "5000"                 # Internal only — not exposed to host
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - frontend-net
      - backend-net
    volumes:
      - backend-logs:/app/logs
    healthcheck:
      test:         ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval:     30s
      timeout:      10s
      retries:      5
      start_period: 30s

  # ── Tier 3 — MySQL (mirrors RDS for local dev) ─────────────
  mysql:
    image: mysql:8.0
    container_name: rural-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE:      rural_portal
      MYSQL_USER:          ${DB_USER:-admin}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-adminpass}
    expose:
      - "3306"               # Internal only
    networks:
      - backend-net
    volumes:
      - mysql-data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test:         ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval:     10s
      timeout:      5s
      retries:      10
      start_period: 40s

# ── Networks (three-tier isolation) ───────────────────────────
networks:
  frontend-net:
    driver: bridge
    name: rural-frontend-net
  backend-net:
    driver: bridge
    name: rural-backend-net

# ── Persistent volumes ────────────────────────────────────────
volumes:
  mysql-data:
    name: rural-mysql-data
  backend-logs:
    name: rural-backend-logs
